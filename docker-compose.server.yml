services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hramgo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hramgo}
      POSTGRES_USER: ${POSTGRES_USER:-hramgo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - hramgo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hramgo} -d ${POSTGRES_DB:-hramgo}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  setup:
    image: hramgo-app:latest
    restart: "no"
    env_file:
      - .env.server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hramgo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hramgo}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push"
    networks:
      - internal

  seed:
    image: hramgo-app:latest
    restart: "no"
    profiles:
      - manual
    env_file:
      - .env.server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hramgo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hramgo}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm run db:seed"
    networks:
      - internal

  app:
    image: hramgo-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hramgo-app
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hramgo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hramgo}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    expose:
      - "3000"
    command: >
      sh -c "npx prisma generate && npm run start -- --hostname 0.0.0.0 --port 3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal
      - caddy

volumes:
  hramgo-postgres-data:

networks:
  internal:
  caddy:
    external: true
    name: massage-club_default
