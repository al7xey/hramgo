services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hramgo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hramgo
      POSTGRES_USER: hramgo
      POSTGRES_PASSWORD: hramgo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hramgo -d hramgo"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: hramgo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  redis:
    image: redis:7.4-alpine
    container_name: hramgo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  minio-data:
